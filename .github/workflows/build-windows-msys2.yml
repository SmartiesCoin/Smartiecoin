name: Build Windows (MSYS2 / BDB 6.2 + Qt5)

# Windows-native build using MSYS2 + MinGW-w64 on GitHub's windows-latest
# runner. Produces fully-static smartiecoind.exe / smartiecoin-cli.exe /
# smartiecoin-qt.exe linked against Berkeley DB 6.2 (the MSYS2-packaged
# version), matching the wallet.dat Btree v10 format that v0.1.9 / v0.2.x
# Windows wallets were written in. No DLLs alongside.
#
# Triggers automatically on every v* tag — no manual rebuild needed at
# release time. Runs alongside the standard Guix matrix so Linux/macOS
# stay on the canonical BDB 4.8 path and Windows gets BDB 6.2 + Qt5.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  windows-msys2:
    runs-on: windows-latest
    timeout-minutes: 240
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSYS2 MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            make
            pkg-config
            python
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-db
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-libnatpmp
            mingw-w64-x86_64-qt5-static

      - name: Show toolchain
        run: |
          gcc --version | head -1
          pkg-config --modversion libdb_cxx || true
          pacman -Qi mingw-w64-x86_64-db 2>/dev/null | head -5 || true
          ls /mingw64/qt5-static/bin/qmake.exe && /mingw64/qt5-static/bin/qmake.exe -v || true

      - name: autogen
        run: ./autogen.sh

      - name: Debug Qt5-static layout
        run: |
          set +e
          echo "--- /mingw64/qt5-static/ root ---"
          ls /mingw64/qt5-static/
          echo "--- /mingw64/qt5-static/share/ ---"
          ls /mingw64/qt5-static/share/ 2>/dev/null
          echo "--- find libqminimal.a anywhere ---"
          find /mingw64 -name 'libqminimal*' 2>/dev/null | head
          echo "--- find libq*.a under /mingw64/qt5-static/ ---"
          find /mingw64/qt5-static -name 'libq*.a' 2>/dev/null | head -30
          echo "--- find any .a containing 'minimal' or 'windows' under qt5-static ---"
          find /mingw64/qt5-static \( -name '*minimal*' -o -name '*qwindows*' \) 2>/dev/null | head -40
          echo "--- libQt5*.a (lib/) ---"
          ls /mingw64/qt5-static/lib/libQt5*.a 2>/dev/null | head -20
          echo "--- pkgconfig content ---"
          ls /mingw64/qt5-static/lib/pkgconfig/ 2>/dev/null | head -40
          true

      - name: Synthesize .pc stubs for Qt5 private support modules
        # bitcoin_qt.m4 looks up Qt5AccessibilitySupport / ThemeSupport /
        # FontDatabaseSupport / etc via PKG_CHECK_MODULES, but MSYS2's
        # qt5-static package only ships .pc files for the public Qt5
        # modules — not the private internal *Support libraries (whose
        # static .a files are shipped). Generate minimal .pc stubs that
        # point at the static archives so configure can finish detection.
        run: |
          QT_PKGCFG=/mingw64/qt5-static/lib/pkgconfig
          QT_LIBDIR=/mingw64/qt5-static/lib
          QT_INCDIR=/mingw64/qt5-static/include
          QT_VERSION=$(/mingw64/qt5-static/bin/qmake.exe -query QT_VERSION 2>/dev/null | tr -d '\r' || echo 5.15.18)
          echo "Qt version: $QT_VERSION"
          echo "--- existing pkgconfig modules ---"
          ls $QT_PKGCFG | grep -i "Qt5" | head -20
          echo "--- missing modules will be stubbed ---"
          for mod in AccessibilitySupport DeviceDiscoverySupport EdidSupport EventDispatcherSupport FbSupport FontDatabaseSupport ThemeSupport WindowsUIAutomationSupport VulkanSupport; do
            pc="$QT_PKGCFG/Qt5$mod.pc"
            lib="$QT_LIBDIR/libQt5$mod.a"
            if [ -f "$pc" ]; then
              echo "  Qt5$mod: .pc already exists"
            elif [ -f "$lib" ]; then
              cat > "$pc" <<EOF
          prefix=/mingw64/qt5-static
          libdir=\${prefix}/lib
          includedir=\${prefix}/include

          Name: Qt5$mod
          Description: Qt5 $mod private support module (MSYS2 stub)
          Version: $QT_VERSION
          Libs: -L\${libdir} -lQt5$mod
          Cflags: -I\${includedir}/Qt5$mod -I\${includedir}
          EOF
              echo "  Qt5$mod: stubbed → $pc"
            else
              echo "  Qt5$mod: NEITHER .pc NOR .a exists, skipping"
            fi
          done

      - name: configure
        run: |
          # Fully static build: BDB 6.2, Qt5, libgcc, libstdc++, winpthread
          # all baked into the .exe so it drops on a clean Windows install
          # with no DLLs alongside.
          #
          # MSYS2's /mingw64/lib/libdb_cxx.a is actually the *import library*
          # for libdb_cxx-6.2.dll (1.6 MB stub). The true static archive is
          # libdb_cxx-6.2.a (2.6 MB, contains the .o files). Pointing
          # BDB_LIBS at that pulls Berkeley DB 6.2 into the binary.
          #
          # qt5-static lives at /mingw64/qt5-static/ in MSYS2 — its
          # .pc files ship the full static-link dependency list (libpng,
          # harfbuzz, freetype, pcre2, zlib, qtpcre2, etc.) so configure
          # picks them up via PKG_CONFIG_PATH. --with-gui=qt5 forces qt5.
          #
          # -static + -static-libgcc + -static-libstdc++ avoid the
          # libgcc_s_seh-1.dll / libstdc++-6.dll / libwinpthread-1.dll
          # runtime deps that mingw normally introduces.
          export PKG_CONFIG_PATH=/mingw64/qt5-static/lib/pkgconfig:/mingw64/lib/pkgconfig
          export PATH=/mingw64/qt5-static/bin:$PATH
          ./configure \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --disable-stacktraces \
            --disable-zmq \
            --with-gui=qt5 \
            --with-qt-bindir=/mingw64/qt5-static/bin \
            --with-qt-incdir=/mingw64/qt5-static/include \
            --with-qt-libdir=/mingw64/qt5-static/lib \
            --with-qt-plugindir=/mingw64/qt5-static/share/qt5/plugins \
            --with-incompatible-bdb \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            BDB_LIBS="/mingw64/lib/libdb_cxx-6.2.a" \
            LDFLAGS="-static -static-libgcc -static-libstdc++ -L/mingw64/qt5-static/share/qt5/plugins/platforms -L/mingw64/qt5-static/share/qt5/plugins/styles" \
            || (cat config.log; false)

      - name: make
        run: make -j2

      - name: collect binaries
        run: |
          mkdir -p artifacts/smartiecoin-windows-msys2
          cp src/smartiecoind.exe       artifacts/smartiecoin-windows-msys2/
          cp src/smartiecoin-cli.exe    artifacts/smartiecoin-windows-msys2/
          cp src/qt/smartiecoin-qt.exe  artifacts/smartiecoin-windows-msys2/
          # strip debug symbols to get saner file sizes
          strip artifacts/smartiecoin-windows-msys2/smartiecoind.exe      || true
          strip artifacts/smartiecoin-windows-msys2/smartiecoin-cli.exe   || true
          strip artifacts/smartiecoin-windows-msys2/smartiecoin-qt.exe    || true
          ls -la artifacts/smartiecoin-windows-msys2/
          file artifacts/smartiecoin-windows-msys2/*.exe
          # Verify static link: should NOT contain libdb_cxx / Qt5*.dll references
          echo ""
          echo "=== DLL deps for smartiecoind.exe (should be Win32 system only) ==="
          strings artifacts/smartiecoin-windows-msys2/smartiecoind.exe | grep -iE "\\.dll$" | sort -u | head -20
          echo ""
          echo "=== DLL deps for smartiecoin-qt.exe (should be Win32 system only) ==="
          strings artifacts/smartiecoin-windows-msys2/smartiecoin-qt.exe | grep -iE "\\.dll$" | sort -u | head -30
          echo ""
          echo "=== BDB version baked in ==="
          (strings artifacts/smartiecoin-windows-msys2/smartiecoind.exe | grep -E "Berkeley DB [0-9]" | head -3) || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartiecoin-windows-msys2
          path: artifacts/smartiecoin-windows-msys2/
          retention-days: 30
